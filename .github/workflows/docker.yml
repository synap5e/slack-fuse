name: Build and push container image

# Builds ghcr.io/synap5e/slack-fuse on every push to main and every tag, then
# pushes a single multi-tag manifest:
#   - main pushes  → :main, :sha-<commit>
#   - tag v1.2.3   → :1.2.3, :latest (sha is also pushed)
# The k8s-homelab manifest pins one of these tags by digest, never :latest.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - Dockerfile
      - pyproject.toml
      - uv.lock
      - slack_fuse/**
      - slack_fuse_render/**
      - slack_fuse_server/**
      - .github/workflows/docker.yml
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - pyproject.toml
      - uv.lock
      - slack_fuse/**
      - slack_fuse_render/**
      - slack_fuse_server/**
      - .github/workflows/docker.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/synap5e/slack-fuse
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
